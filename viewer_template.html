<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>72288 - Transfer Drive File Listing</title>
<style>
:root{--bg:#f5f6f8;--panel:#fff;--line:#e2e5ea;--txt:#1c2733;--dim:#68737f;--acc:#1a6fb5;--hov:#eef4fa;--sel:#dcebf7}
*{box-sizing:border-box}
body{margin:0;font:14px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--txt)}
header{position:sticky;top:0;z-index:10;background:var(--panel);border-bottom:1px solid var(--line);padding:10px 16px;display:flex;flex-wrap:wrap;gap:8px 18px;align-items:center}
header h1{font-size:16px;margin:0;font-weight:600}
header .tot{color:var(--dim);font-size:13px}
#sbox{margin-left:auto;display:flex;gap:6px}
#sbox input{width:260px;padding:6px 10px;border:1px solid var(--line);border-radius:6px;font-size:13px}
#sbox select{padding:6px 8px;border:1px solid var(--line);border-radius:6px;font-size:13px;background:#fff}
#sbox label{align-self:center}
#sbox button{padding:6px 12px;border:1px solid var(--acc);background:var(--acc);color:#fff;border-radius:6px;font-size:13px;cursor:pointer}
#sbox button.sec{background:#fff;color:var(--acc)}
main{padding:12px 16px;max-width:1200px;margin:0 auto}
#loading{padding:60px;text-align:center;color:var(--dim);font-size:15px}
.row{display:flex;align-items:center;padding:1px 4px;border-radius:4px;white-space:nowrap}
.row:hover{background:var(--hov)}
.tw{cursor:pointer;width:18px;flex:0 0 18px;text-align:center;color:var(--dim);user-select:none;font-size:11px}
.ic{width:20px;flex:0 0 20px;text-align:center}
.nm{overflow:hidden;text-overflow:ellipsis;min-width:0}
.fold>.nm{cursor:pointer;font-weight:600}
.meta{margin-left:auto;color:var(--dim);font-size:12px;padding-left:16px;flex:0 0 auto}
.kids{margin-left:20px;border-left:1px dotted var(--line);padding-left:2px}
.more{color:var(--acc);cursor:pointer;padding:2px 24px;font-size:13px}
.more:hover{text-decoration:underline}
#results{display:none}
#results .path{color:var(--dim);font-size:12px;overflow:hidden;text-overflow:ellipsis}
#results .hit{padding:4px 8px;border-bottom:1px solid var(--line)}
#rhead{padding:8px;color:var(--dim)}
.empty{color:var(--dim);font-style:italic;padding:2px 24px;font-size:13px}
#err{display:none;margin:40px auto;max-width:600px;background:#fff3f3;border:1px solid #e0b4b4;padding:20px;border-radius:8px}
</style>
</head>
<body>
<header>
  <h1 id="vol">File Listing</h1>
  <span class="tot" id="tot"></span>
  <div id="sbox">
    <label class="tot" for="sort">Sort:</label>
    <select id="sort" disabled>
      <option value="name">Name (A-Z)</option>
      <option value="size">Size (largest first)</option>
      <option value="files">File count (most first)</option>
    </select>
    <input id="q" type="search" placeholder="Search file names..." disabled>
    <button id="go" disabled>Search</button>
    <button id="clr" class="sec" style="display:none">Back to tree</button>
  </div>
</header>
<main>
  <div id="loading">Loading file listing&hellip;</div>
  <div id="err"><b>This browser can't open this report.</b><br>Please use a current version of Chrome, Edge, Firefox, or Safari.</div>
  <div id="tree"></div>
  <div id="results"><div id="rhead"></div><div id="rlist"></div></div>
</main>
<script id="payload" type="application/octet-stream">__DATA__</script>
<script>
"use strict";
var ROOT=null;
var CHUNK=1500;

function fmtSize(b){
  if(b<1024)return b+" B";
  var u=["KB","MB","GB","TB"],i=-1;
  do{b/=1024;i++}while(b>=1024&&i<u.length-1);
  return (b>=100?b.toFixed(0):b.toFixed(1))+" "+u[i];
}
function fmtDate(ts){
  if(!ts)return "";
  var d=new Date(ts*1000);
  function p(n){return n<10?"0"+n:n}
  return p(d.getUTCMonth()+1)+"/"+p(d.getUTCDate())+"/"+d.getUTCFullYear()+" "+p(d.getUTCHours())+":"+p(d.getUTCMinutes());
}
function el(tag,cls,txt){var e=document.createElement(tag);if(cls)e.className=cls;if(txt!=null)e.textContent=txt;return e;}

// node: [name, ts, totalSize, fileCount, dirCount, files[[n,sz,ts]], dirs[]]
function folderRow(node){
  var wrap=el("div");
  var row=el("div","row fold");
  var tw=el("span","tw","▶");
  var ic=el("span","ic","📁");
  var nm=el("span","nm",node[0]||"(unnamed)");
  var meta=el("span","meta",fmtSize(node[2])+" • "+node[3].toLocaleString()+" files"+(node[1]?" • "+fmtDate(node[1]):""));
  row.appendChild(tw);row.appendChild(ic);row.appendChild(nm);row.appendChild(meta);
  wrap.appendChild(row);
  var kids=null,open=false;
  function toggle(){
    open=!open;
    tw.textContent=open?"▼":"▶";
    if(open&&!kids){kids=el("div","kids");renderChildren(node,kids,0);wrap.appendChild(kids);}
    else if(kids)kids.style.display=open?"":"none";
  }
  tw.onclick=toggle;nm.onclick=toggle;
  return wrap;
}
function fileRow(f){
  var row=el("div","row");
  row.appendChild(el("span","tw",""));
  row.appendChild(el("span","ic","📄"));
  row.appendChild(el("span","nm",f[0]));
  row.appendChild(el("span","meta",fmtSize(f[1])+(f[2]?" • "+fmtDate(f[2]):"")));
  return row;
}
var SORT="name";
function sortedItems(node){
  var dirs=node[6].slice(),files=node[5].slice();
  if(SORT==="size"){
    dirs.sort(function(a,b){return b[2]-a[2]});
    files.sort(function(a,b){return b[1]-a[1]});
  }else if(SORT==="files"){
    dirs.sort(function(a,b){return b[3]-a[3]});
    files.sort(function(a,b){return b[1]-a[1]});
  }
  // "name": arrays are pre-sorted alphabetically
  return dirs.concat(files);
}
function renderChildren(node,cont,start){
  var items=sortedItems(node),i;
  if(!items.length&&start===0){cont.appendChild(el("div","empty","This folder is empty"));return;}
  var end=Math.min(items.length,start+CHUNK);
  var frag=document.createDocumentFragment();
  for(i=start;i<end;i++){
    var it=items[i];
    frag.appendChild(it.length===7?folderRow(it):fileRow(it));
  }
  cont.appendChild(frag);
  if(end<items.length){
    var more=el("div","more","Show more ("+(items.length-end).toLocaleString()+" remaining)");
    more.onclick=function(){cont.removeChild(more);renderChildren(node,cont,end);};
    cont.appendChild(more);
  }
}

function doSearch(){
  var q=document.getElementById("q").value.trim().toLowerCase();
  if(q.length<2)return;
  var res=[],MAX=2000,truncated=false;
  var stack=[[ROOT,""]];
  while(stack.length){
    var top=stack.pop(),node=top[0],path=top[1];
    var here=path+(node[0]||"")+"/";
    var i;
    for(i=0;i<node[5].length;i++){
      var f=node[5][i];
      if(f[0].toLowerCase().indexOf(q)>=0){
        res.push([f[0],here,f[1],f[2],0]);
        if(res.length>=MAX){truncated=true;stack.length=0;break;}
      }
    }
    if(truncated)break;
    for(i=0;i<node[6].length;i++){
      var d=node[6][i];
      if(d[0].toLowerCase().indexOf(q)>=0){
        res.push([d[0],here,d[2],d[1],1]);
        if(res.length>=MAX){truncated=true;break;}
      }
      stack.push([d,here]);
    }
    if(truncated)break;
  }
  var rl=document.getElementById("rlist");rl.innerHTML="";
  document.getElementById("rhead").textContent=(truncated?MAX.toLocaleString()+"+ matches (showing first "+MAX.toLocaleString()+")":res.length.toLocaleString()+" match"+(res.length===1?"":"es"))+" for “"+q+"”";
  var frag=document.createDocumentFragment();
  for(var j=0;j<res.length;j++){
    var r=res[j];
    var hit=el("div","hit");
    var l1=el("div","row");
    l1.appendChild(el("span","ic",r[4]?"📁":"📄"));
    l1.appendChild(el("span","nm",r[0]));
    l1.appendChild(el("span","meta",fmtSize(r[2])+(r[3]?" • "+fmtDate(r[3]):"")));
    hit.appendChild(l1);
    hit.appendChild(el("div","path",r[1]));
    frag.appendChild(hit);
  }
  rl.appendChild(frag);
  document.getElementById("tree").style.display="none";
  document.getElementById("results").style.display="block";
  document.getElementById("clr").style.display="";
}
function clearSearch(){
  document.getElementById("results").style.display="none";
  document.getElementById("tree").style.display="";
  document.getElementById("clr").style.display="none";
}

async function init(){
  try{
    if(typeof DecompressionStream==="undefined")throw new Error("no ds");
    var b64=document.getElementById("payload").textContent.trim();
    var bin=atob(b64);b64=null;
    var bytes=new Uint8Array(bin.length);
    for(var i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);
    bin=null;
    var ds=new DecompressionStream("gzip");
    var stream=new Blob([bytes]).stream().pipeThrough(ds);
    var json=await new Response(stream).text();
    bytes=null;
    var payload=JSON.parse(json);json=null;
    ROOT=payload.tree;
    document.getElementById("vol").textContent=payload.vol||"File Listing";
    document.getElementById("tot").textContent=ROOT[3].toLocaleString()+" files • "+ROOT[4].toLocaleString()+" folders • "+fmtSize(ROOT[2]);
    document.getElementById("loading").style.display="none";
    renderChildren(ROOT,document.getElementById("tree"),0);
    var q=document.getElementById("q"),go=document.getElementById("go"),so=document.getElementById("sort");
    q.disabled=false;go.disabled=false;so.disabled=false;
    so.onchange=function(){
      SORT=so.value;
      var t=document.getElementById("tree");
      t.innerHTML="";
      renderChildren(ROOT,t,0);
      clearSearch();
    };
    go.onclick=doSearch;
    q.addEventListener("keydown",function(e){if(e.key==="Enter")doSearch();});
    document.getElementById("clr").onclick=clearSearch;
  }catch(e){
    document.getElementById("loading").style.display="none";
    document.getElementById("err").style.display="block";
  }
}
init();
</script>
</body>
</html>
